<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auriculares Pro Max | Landing Premium</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <span class="brand-label">SONY</span>
                <span class="brand-subtitle">Pro Audio</span>
            </div>
            <button class="cart-button" id="cartButton" aria-label="Ver carrito">
                <span class="cart-icon">🛒</span>
                <span class="cart-count" id="cartCount">0</span>
            </button>
        </header>

        <main class="hero">
            <section class="hero-copy">
                <span class="eyebrow">Auriculares premium</span>
                <h1 id="productTitle">Auriculares Pro Max Black Edition</h1>
                <p id="productDescription">Experiencia de audio premium con cancelación inteligente de ruido y sonido envolvente.</p>

                <div class="info-row">
                    <div class="price" id="productPrice">$799.99</div>
                    <button class="buy-btn" id="buyNow"><span class="buy-icon">🛒</span> Comprar Ahora</button>
                    <button class="remove-btn" id="removeProduct">Eliminar producto</button>
                </div>

                <div class="hero-footnote">
                    Calidad de estudio, diseño refinado y experiencia envolvente en cada escucha.
                </div>
            </section>

            <section class="hero-visual">
                <div class="hero-image" id="heroImage">
                    <img src="ChatGPT Image 21 jun 2026, 10_42_28.png" alt="Auriculares Pro Max Black Edition" class="carousel-item active">
                    <img src="ChatGPT Image 21 jun 2026, 10_49_50.png" alt="Auriculares Pro Max Red Edition" class="carousel-item inactive">
                    <img src="ChatGPT Image 21 jun 2026, 10_54_07.png" alt="Auriculares Pro Max Green Edition" class="carousel-item inactive">
                    <img src="ChatGPT Image 21 jun 2026, 10_56_33.png" alt="Auriculares Pro Max Pink Edition" class="carousel-item inactive">
                </div>
            </section>
        </main>

        <div class="notification" id="notification" aria-live="polite"></div>
    </div>

    <script src="javascript.js"></script>
</body>
</html>
